<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refik Kart | NFC Reader</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --error: #ef4444;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1e293b;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 420px;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .logo-area {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .nfc-icon-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: #dbeafe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid var(--primary);
            border-radius: 50%;
            opacity: 0;
            display: none;
        }

        .active-scan .pulse {
            display: block;
            animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {
            75%, 100% { transform: scale(1.8); opacity: 0; }
            0% { transform: scale(1); opacity: 1; }
        }

        h1 { font-size: 1.5rem; margin: 0; color: #0f172a; }
        p { color: var(--secondary); margin: 0.5rem 0 2rem; font-size: 0.95rem; }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }

        #resultPanel {
            margin-top: 1.5rem;
            text-align: left;
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .data-card {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .data-label { font-size: 0.75rem; color: var(--secondary); text-transform: uppercase; font-weight: 700; }
        .data-value { font-family: monospace; font-size: 1.1rem; color: #1e293b; word-break: break-all; margin-bottom: 0.8rem; display: block; }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .status-ok { background: #dcfce7; color: #166534; }
        .status-info { background: #fef9c3; color: #854d0e; }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div class="logo-area">Refik Kart</div>
        
        <div class="nfc-icon-wrapper" id="iconWrapper">
            <div class="pulse"></div>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
                <path d="M20 4v16M4 4v16M8 12h8M12 8v8"/>
            </svg>
        </div>

        <h1>NFC Tarayıcı</h1>
        <p id="statusTxt">Kartınızı okutmak için butona basın ve telefonun arkasına yaklaştırın.</p>

        <button id="scanBtn" class="btn">Taramayı Başlat</button>

        <div id="resultPanel">
            <div class="data-card">
                <span class="data-label">Kart Seri Numarası (UID)</span>
                <span id="uidVal" class="data-value">-</span>
                
                <span class="data-label">İçerik / Mesaj</span>
                <span id="msgVal" class="data-value" style="font-size: 0.9rem;">-</span>
                
                <div id="statusBadge" class="status-badge"></div>
            </div>
        </div>
    </div>

    <script>
        const scanBtn = document.getElementById('scanBtn');
        const statusTxt = document.getElementById('statusTxt');
        const resultPanel = document.getElementById('resultPanel');
        const uidVal = document.getElementById('uidVal');
        const msgVal = document.getElementById('msgVal');
        const iconWrapper = document.getElementById('iconWrapper');
        const statusBadge = document.getElementById('statusBadge');

        // NFC Destek Kontrolü
        if (!('NDEFReader' in window)) {
            statusTxt.innerHTML = "❌ Hata: Bu tarayıcı NFC desteklemiyor. Lütfen Android Chrome kullanın.";
            scanBtn.disabled = true;
        }

        scanBtn.addEventListener('click', async () => {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                
                // UI Güncelleme: Tarama Modu
                iconWrapper.classList.add('active-scan');
                statusTxt.innerText = "Kart Bekleniyor... Lütfen temassız kartı yaklaştırın.";
                scanBtn.innerText = "Dinleniyor...";
                scanBtn.disabled = true;
                resultPanel.style.display = "none";

                ndef.addEventListener("readingerror", () => {
                    alert("Kart algılandı ancak veri okunamadı. Kartın standartlara uygun olduğundan emin olun.");
                });

                ndef.addEventListener("reading", ({ message, serialNumber }) => {
                    // Veri Geldi!
                    iconWrapper.classList.remove('active-scan');
                    resultPanel.style.display = "block";
                    statusTxt.innerText = "İşlem Başarılı!";
                    scanBtn.disabled = false;
                    scanBtn.innerText = "Tekrar Tara";

                    // Seri No Yaz (Her zaman gelmeli)
                    uidVal.innerText = serialNumber || "Bilinmiyor";

                    // Mesajları Çöz
                    if (message.records.length > 0) {
                        let content = "";
                        for (const record of message.records) {
                            const decoder = new TextDecoder(record.encoding || 'utf-8');
                            content += `[${record.recordType}]: ${decoder.decode(record.data)}\n`;
                        }
                        msgVal.innerText = content;
                        statusBadge.innerText = "NDEF Verisi Okundu";
                        statusBadge.className = "status-badge status-ok";
                    } else {
                        msgVal.innerText = "Bu kartta açık veri (NDEF) bulunamadı.";
                        statusBadge.innerText = "Güvenli/Boş Kart";
                        statusBadge.className = "status-badge status-info";
                    }
                });

            } catch (error) {
                console.error(error);
                alert("NFC Başlatılamadı: " + error);
                iconWrapper.classList.remove('active-scan');
                scanBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
