<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refik Kart | Dijital NFC Tarayıcı</title>
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --error-color: #dc3545;
            --dark-bg: #121212;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .nfc-animation {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            background: #eef2ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(.33); opacity: 1; }
            80%, 100% { transform: scale(1.5); opacity: 0; }
        }

        h1 { font-size: 1.8rem; margin: 0 0 0.5rem; color: #1a1a1a; }
        p { color: #666; line-height: 1.5; margin-bottom: 2rem; }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0,123,255,0.3);
        }

        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        #logContainer {
            margin-top: 1.5rem;
            text-align: left;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            display: none;
            border: 1px solid #eee;
        }

        .data-item {
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #ddd;
        }

        .label { font-weight: bold; color: var(--primary-color); text-transform: uppercase; font-size: 0.7rem; display: block; }
        .value { font-size: 1rem; color: #222; word-break: break-all; }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            background: #eee;
            margin-top: 5px;
        }

        footer { margin-top: 2rem; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>

    <div class="card">
        <div class="nfc-animation" id="animationBox" style="display: none;">
            <div class="pulse"></div>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#007bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>

        <h1>Refik Kart Okuyucu</h1>
        <p id="statusMsg">NFC özellikli kimlik veya RFID kartınızı okutmak için aşağıdaki butona basın.</p>

        <button id="scanBtn" class="btn">Taramayı Başlat</button>

        <div id="logContainer">
            <div id="dataOutput"></div>
        </div>
    </div>

    <footer>Refik Kart Projesi v1.0 | Web NFC API</footer>

    <script>
        const scanBtn = document.getElementById('scanBtn');
        const statusMsg = document.getElementById('statusMsg');
        const logContainer = document.getElementById('logContainer');
        const dataOutput = document.getElementById('dataOutput');
        const animationBox = document.getElementById('animationBox');

        // NFC Desteği Kontrolü
        if (!('NDEFReader' in window)) {
            statusMsg.innerHTML = "❌ Tarayıcı Hatası: Web NFC bu cihazda desteklenmiyor. Lütfen Android'de Chrome kullanın.";
            scanBtn.disabled = true;
        }

        scanBtn.addEventListener('click', async () => {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                
                // Arayüzü güncelle
                statusMsg.innerText = "Temassız kart bekleniyor... Kartı telefonun arkasına (genelde kamera yanına) yaklaştırın.";
                animationBox.style.display = "flex";
                scanBtn.style.display = "none";
                logContainer.style.display = "none";
                dataOutput.innerHTML = "";

                ndef.addEventListener("readingerror", () => {
                    alert("Kart algılandı ancak okunamadı. Kartın NDEF formatında olduğundan emin olun.");
                });

                ndef.addEventListener("reading", ({ message, serialNumber }) => {
                    // Kart okunduğunda cihaz titrer (tarayıcı varsayılanıdır)
                    logContainer.style.display = "block";
                    animationBox.style.display = "none";
                    statusMsg.innerText = "Kart başarıyla okundu!";

                    let htmlContent = "";

                    // 1. Seri Numarası (UID) - Her zaman gelmeli
                    htmlContent += `
                        <div class="data-item">
                            <span class="label">Kart Seri No (UID)</span>
                            <span class="value">${serialNumber}</span>
                        </div>
                    `;

                    // 2. Mesaj İçeriği (NDEF Verileri)
                    if (message.records.length > 0) {
                        message.records.forEach((record, index) => {
                            const decoder = new TextDecoder(record.encoding || 'utf-8');
                            const decodedData = decoder.decode(record.data);
                            
                            htmlContent += `
                                <div class="data-item">
                                    <span class="label">Kayıt #${index + 1} (${record.recordType})</span>
                                    <span class="value">${decodedData}</span>
                                    <span class="badge">Format: ${record.mediaType || 'Standart Metin'}</span>
                                </div>
                            `;
                        });
                    } else {
                        htmlContent += `
                            <div class="data-item" style="color: #666; font-style: italic;">
                                İçerik Verisi: Bu kartta okunabilir NDEF verisi bulunamadı (Kimlik veya Banka kartı olabilir).
                            </div>
                        `;
                    }

                    dataOutput.innerHTML = htmlContent;
                    
                    // Butonu geri getir
                    scanBtn.style.display = "block";
                    scanBtn.innerText = "Yeniden Tara";
                });

            } catch (error) {
                console.error("Hata:", error);
                statusMsg.innerHTML = `⚠️ Hata: ${error.message}`;
            }
        });
    </script>
</body>
</html>
